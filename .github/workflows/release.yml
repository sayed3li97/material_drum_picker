name: Release on merge to main

# On every push to main this reads the version from pubspec.yaml and, if no
# release exists for it yet, creates a GitHub Release tagged vX.Y.Z whose notes
# are the matching section of CHANGELOG.md. So each merge that bumps the version
# publishes a new, incrementing GitHub Release automatically.
#
# The tag and release are created with the built in GITHUB_TOKEN, so no secret
# is required for the GitHub Release itself. A merge that does not change the
# version is a safe no-op (the release for that version already exists).
#
# Publishing to pub.dev (optional): if a RELEASE_PAT secret is present (a fine
# grained personal access token with Contents: read and write), the tag is
# pushed with it first so the "Publish to pub.dev" workflow triggers (the
# default GITHUB_TOKEN cannot trigger another workflow). Without the secret the
# GitHub Release is still created; publish to pub.dev by hand, or add the
# secret. One time pub.dev setup is in CONTRIBUTING.md.

on:
  push:
    branches: [main]

permissions:
  contents: write

jobs:
  release:
    runs-on: ubuntu-22.04
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Resolve version
        id: v
        env:
          GH_TOKEN: ${{ github.token }}
        run: |
          version=$(grep '^version:' pubspec.yaml | head -1 \
            | sed 's/version:[[:space:]]*//' | tr -d '[:space:]')
          echo "version=$version" >> "$GITHUB_OUTPUT"
          echo "Resolved version: $version"

          if git rev-parse "v$version" >/dev/null 2>&1 \
            || gh release view "v$version" >/dev/null 2>&1; then
            echo "v$version is already released. Nothing to do."
            echo "release=false" >> "$GITHUB_OUTPUT"
          else
            echo "release=true" >> "$GITHUB_OUTPUT"
          fi

      - name: Extract release notes from CHANGELOG
        if: steps.v.outputs.release == 'true'
        run: |
          version="${{ steps.v.outputs.version }}"
          awk -v ver="$version" '
            $0 == "## " ver { flag = 1; next }
            flag && /^## / { exit }
            flag { print }
          ' CHANGELOG.md > RELEASE_NOTES.md
          # Trim leading/trailing blank lines; fall back to a default note.
          if ! grep -q '[^[:space:]]' RELEASE_NOTES.md; then
            printf 'Release v%s\n' "$version" > RELEASE_NOTES.md
          fi
          echo '---- release notes ----'
          cat RELEASE_NOTES.md

      - name: Create the GitHub Release
        if: steps.v.outputs.release == 'true'
        env:
          GH_TOKEN: ${{ github.token }}
          RELEASE_PAT: ${{ secrets.RELEASE_PAT }}
        run: |
          tag="v${{ steps.v.outputs.version }}"
          if [ -n "$RELEASE_PAT" ]; then
            # Push the tag with the PAT so the Publish to pub.dev workflow runs,
            # then attach the release to that tag.
            git config user.name "github-actions[bot]"
            git config user.email "github-actions[bot]@users.noreply.github.com"
            git tag -a "$tag" -m "Release $tag"
            git push \
              "https://x-access-token:${RELEASE_PAT}@github.com/${{ github.repository }}.git" \
              "$tag"
            gh release create "$tag" --title "$tag" --notes-file RELEASE_NOTES.md
            echo "Created release $tag and pushed the tag (publish workflow will run)."
          else
            echo "::notice::RELEASE_PAT is not set. Creating the GitHub Release with GITHUB_TOKEN; Publish to pub.dev will not auto-trigger for this release."
            gh release create "$tag" --title "$tag" \
              --notes-file RELEASE_NOTES.md --target main
            echo "Created release $tag on main."
          fi
