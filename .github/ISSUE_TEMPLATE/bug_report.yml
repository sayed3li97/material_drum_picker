name: Bug report
description: Report a problem with material_drum_picker
labels: ["bug"]
body:
  - type: markdown
    attributes:
      value: Thanks for taking the time to file a bug report.
  - type: textarea
    id: what-happened
    attributes:
      label: What happened?
      description: A clear description of the bug, and what you expected instead.
    validations:
      required: true
  - type: textarea
    id: repro
    attributes:
      label: Steps to reproduce
      description: Ideally a minimal code snippet that reproduces the issue.
      placeholder: |
        1. Call showDrumDatePicker with ...
        2. Tap ...
        3. See ...
    validations:
      required: true
  - type: textarea
    id: flutter-doctor
    attributes:
      label: Output of `flutter doctor -v`
      render: shell
    validations:
      required: true
  - type: input
    id: package-version
    attributes:
      label: material_drum_picker version
      placeholder: 1.2.0
    validations:
      required: true
  - type: dropdown
    id: platforms
    attributes:
      label: Platforms
      multiple: true
      options:
        - Android
        - iOS
        - Web
        - macOS
        - Windows
        - Linux
    validations:
      required: true
